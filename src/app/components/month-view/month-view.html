<!-- Weekday header row -->
<div class="calendar-grid weekday-header">
  <div class="weekday-cell" *ngFor="let day of weekDays">
    {{ day }}
  </div>
</div>

<!-- Month calendar grid -->
<div class="calendar-grid">
  <div
    class="day-cell"
    *ngFor="let day of calendarDays"
    (click)="selectDate(day)"
    [ngClass]="{
      'outside-month': !isCurrentMonth(day),
      'selected-day': isSelectedDate(day),
    }"
  >
    <div class="day-number">
      {{ day.getDate() }}
    </div>
  </div>
</div>
