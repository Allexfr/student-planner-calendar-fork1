<!-- Main calendar page container -->
<div class="container-fluid mt-4">
  <!-- Top section with user info and logout -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2>Student Planner Calendar</h2>

      <p class="mb-0">
        Logged in as:
        {{ firebaseService.currentUser?.email }}
      </p>
    </div>

    <button class="btn btn-danger" (click)="logout()">Logout</button>
  </div>

  <!-- Month navigation controls -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <button class="btn btn-secondary" (click)="previousMonth()">Previous</button>

    <h3>
      {{ currentDate | date: 'MMMM yyyy' }}
    </h3>

    <button class="btn btn-secondary" (click)="nextMonth()">Next</button>
  </div>

  <!-- Main calendar layout -->
  <div class="row">
    <!-- Month grid area -->
    <div class="col-md-9">
      <app-month-view
        [currentDate]="currentDate"
        [selectedDate]="selectedDate"
        [events]="events"
        (dateSelected)="onDateSelected($event)"
      >
      </app-month-view>
    </div>

    <!-- Selected day sidebar -->
    <div class="col-md-3">
      <div class="card p-3 shadow-sm">
        <h4>Selected Day</h4>

        <p>
          {{ selectedDate | date: 'fullDate' }}
        </p>

        <button class="btn btn-primary w-100" (click)="openEventForm()">Add Event</button>
        <div class="mt-3" *ngIf="showEventForm">
          <app-event-form
            [selectedDate]="selectedDate"
            (cancelForm)="closeEventForm()"
            (saveNewEvent)="addEvent($event)"
          ></app-event-form>
        </div>
      </div>
    </div>
  </div>
</div>
